<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>OllieBoard v4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:       #C9A84C;
  --gold-light: #F0D080;
  --gold-dim:   #6A5420;
  --gold-glow:  rgba(201,168,76,0.25);
  --surface:    #111111;
  --surface2:   #1A1A1A;
  --surface3:   #222222;
  --text:       #E8D9A0;
  --text-dim:   #7A6E50;
  --pass:       #4CAF50;
  --pending-c:  #FF9800;
  --panel-w:    360px;

  --c-brown:  #896653; --c-lblue: #c6f4ea; --c-pink:   #a42c74;
  --c-orange: #e09252; --c-red:   #ed1518; --c-yellow: #fcf81d;
  --c-green:  #3a9e58; --c-dblue: #0a18a3;
}

/* ── PAGE LAYOUT ───────────────────────────────────────────────────
   The entire page is a fixed viewport — no body scrolling.
   The board always fits on screen.
──────────────────────────────────────────────────────────────────── */
html, body {
  height: 100%; overflow: hidden;
  background: #050505;
  font-family: 'Inter', sans-serif;
}

body {
  display: flex; flex-direction: column;
  padding: 8px;
}

/* Score bar — same width calculation as .board so pills never exceed board footprint */
.score-bar {
  flex-shrink: 0; display: flex; gap: 8px; margin-top: 8px;
  align-self: center;
  width: min(100%, calc(100vh - 80px));
}
.score-pill { flex:1; background:var(--surface2); border:1px solid var(--gold-dim); border-radius:6px; padding:8px 12px; display:flex; flex-direction:column; gap:4px; }
.score-label { font-size:0.72rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-dim); font-weight:600; }
.score-value { font-size:clamp(1.3rem,2.5vw,1.9rem); color:var(--gold); line-height:1; font-weight:800; }
.score-value span { font-size:0.55em; color:var(--text-dim); font-weight:600; }
.progress-track { height:3px; background:#1e1e1e; border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--gold-dim),var(--gold-light)); border-radius:2px; transition:width 0.8s ease; }

/* Board wrapper fills remaining vertical space */
.board-wrap {
  flex: 1;
  min-height: 0; /* allow shrink */
  position: relative; /* anchor for overlay panel */
  display: flex; align-items: center; justify-content: center;
}

/* ── BOARD ─────────────────────────────────────────────────────────
   Square, fills the smaller of available width/height.
──────────────────────────────────────────────────────────────────── */
.board {
  display: grid;
  grid-template-columns: 120px repeat(9, 1fr) 120px;
  grid-template-rows:    120px repeat(9, 1fr) 120px;
  /* Fill available space — no title bar above, just score bar below (~56px) */
  width:  min(100%, calc(100vh - 80px));
  height: min(100%, calc(100vh - 80px));
  aspect-ratio: 1 / 1;
  border: 4px solid var(--gold);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 0 60px var(--gold-glow), inset 0 0 80px rgba(0,0,0,0.6);
  background: var(--surface);
}

/* Center cell */
.center {
  grid-column: 2/11; grid-row: 2/11;
  position: relative; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 6px; overflow: hidden;
}
.center-grid {
  position: absolute; inset: 0;
  /* Thicker grid lines — 2px, more opaque to match real board prominence */
  background-image: linear-gradient(rgba(201,168,76,0.35) 2px, transparent 2px),
                    linear-gradient(90deg, rgba(201,168,76,0.35) 2px, transparent 2px);
  background-size: calc(100%/9) calc(100%/9); pointer-events: none;
}

/* Center grid cells — thicker border to match surrounding spaces */
.center-cell {
  border: 2px solid rgba(201,168,76,0.22);
  cursor: default;
  transition: background 0.18s, box-shadow 0.18s;
}
.center-cell:hover {
  background: rgba(201,168,76,0.10);
  box-shadow: inset 0 0 20px rgba(201,168,76,0.18);
  z-index: 2;
}
  border:3px solid var(--gold); background:rgba(201,168,76,0.05);
  cursor:default; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:4px;
  overflow:hidden; transition:background 0.2s;
  width:100%; height:100%; aspect-ratio:1/1;
}
.ob-corner:hover { background:rgba(201,168,76,0.09); }
.ob-corner .c-icon  { font-size:clamp(1rem,3.5vw,2.2rem); line-height:1; }
.ob-corner .c-label { font-size:clamp(0.55rem, 1.2vw, 0.82rem);color:var(--gold);font-weight:800;text-align:center;letter-spacing:0.04em;text-transform:uppercase;padding:0 3px; }

/* Space base */
.space {
  position:relative; overflow:hidden;
  background:var(--surface); border:2px solid var(--gold-dim);
  cursor:pointer; transition:background 0.2s,box-shadow 0.2s,transform 0.1s;
  container-type: size;
}
.space:hover { background:#1c1500; box-shadow:inset 0 0 0 2px rgba(201,168,76,0.5); z-index:2; }
.space:active { transform:scale(0.97); }
.space.completed    { background:rgba(201,168,76,0.07); }
.space.completed:hover { background:#1a1700; }
.space.active-sel {
  background:rgba(201,168,76,0.13)!important;
  box-shadow:inset 0 0 0 3px var(--gold),0 0 18px var(--gold-glow)!important;
  z-index:5;
}

/* Center grid cells — addressable as .cell-r{row}-c{col}, gold glow on hover */
.center-cell {
  border: 1px solid rgba(201,168,76,0.08);
  cursor: default;
  transition: background 0.18s, box-shadow 0.18s;
}
.center-cell:hover {
  background: rgba(201,168,76,0.10);
  box-shadow: inset 0 0 20px rgba(201,168,76,0.18);
  z-index: 2;
}

/* Inner rotation wrapper */
.inner {
  position:absolute; display:flex; flex-direction:column;
  align-items:stretch; overflow:visible; transform-origin:center center;
}

/* Property space */
.prop-band {
  flex-shrink:0; height:24px; position:relative;
  display:flex; align-items:center; justify-content:center;
  /* Thick gold border around the color header — matches real Monopoly board */
  box-shadow: inset 0 0 0 2px rgba(0,0,0,0.35), 0 2px 0 0 var(--gold-dim);
  border-bottom: 2px solid var(--gold-dim);
}
.prop-name {
  flex:1;
  display:flex; align-items:flex-start; justify-content:center;
  text-align:center; font-weight:900; color:var(--text);
  text-transform:uppercase; line-height:1.25;
  word-break:break-word; hyphens:auto; white-space:normal;
  padding:6px 4px 2px;
  font-size: clamp(0.65rem, 1.7cqw, 1.05rem);
  overflow: hidden;
}
.prop-pts {
  flex-shrink:0; text-align:center; font-weight:800; color:var(--gold);
  text-transform:uppercase; letter-spacing:0.06em;
  padding:2px 0 3px;
  font-size: clamp(0.55rem, 1.3cqw, 0.85rem);
  line-height:1;
}
/* (star-badge removed — stars now live in footer .prop-stars row) */
@keyframes starPop {
  from { transform:scale(0) rotate(-30deg) translate(-50%,-50%); opacity:0; }
  to   { transform:scale(1) rotate(0) translate(-50%,-50%);       opacity:1; }
}

/* Plain space — no header, text top-aligned with dynamic size */
.plain-name {
  flex:1;
  display:flex; align-items:flex-start; justify-content:center;
  text-align:center; font-weight:700; color:var(--text);
  line-height:1.25; word-break:break-word; hyphens:auto;
  white-space:normal; text-transform:uppercase;
  padding:6px 4px 2px;
  font-size: clamp(0.65rem, 1.7cqw, 1.05rem);
  overflow:hidden;
}
.plain-pts {
  flex-shrink:0; text-align:center; font-weight:800; color:var(--gold);
  text-transform:uppercase; letter-spacing:0.06em;
  padding:2px 0 3px;
  font-size: clamp(0.55rem, 1.3cqw, 0.85rem);
  line-height:1; min-height:8px;
}

/* ── US-04: UNRELEASED SPACE ────────────────────────────────────────
   Property spaces not yet active show:
   - Desaturated/dimmed color band (no dots)
   - Name in muted color
   - Release date on second line
   - No stars, no pts
──────────────────────────────────────────────────────────────────── */
.space.unreleased { cursor: pointer; }
.space.unreleased:hover { background: #161010; }

.prop-band-unreleased {
  flex-shrink: 0; height: 24px; position: relative;
  display: flex; align-items: center; justify-content: center;
  border-bottom: 2px solid var(--gold-dim);
  /* band color set inline but with heavy opacity reduction */
  opacity: 0.45;
}

.prop-name-unreleased {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: flex-start;
  padding: 6px 4px 2px;
  overflow: hidden;
}
.prop-name-unreleased .pnu-label {
  font-size: clamp(0.65rem, 1.7cqw, 1.05rem);
  font-weight: 900; color: var(--text-dim);
  text-transform: uppercase; line-height: 1.25;
  word-break: break-word; hyphens: auto;
  width: 100%; text-align: center;
}
.prop-name-unreleased .pnu-date {
  font-size: clamp(0.42rem, 1cqw, 0.62rem);
  font-weight: 600; color: var(--gold-dim);
  text-transform: uppercase; letter-spacing: 0.08em;
  width: 100%; text-align: center;
  margin-top: 3px;
}

/* Side column fix for unreleased text */
.ob-side .prop-name-unreleased .pnu-label,
.ob-side .prop-name-unreleased .pnu-date { writing-mode: horizontal-tb; }

/* ── US-06: MAYOR TILE (team view, active spaces) ───────────────────
   Replaces the stars row with:
   - Mayor avatar (circle with initials fallback)
   - "MAYOR" label
   PTS row becomes "X PTS EARNED" (total team points)
──────────────────────────────────────────────────────────────────── */
.mayor-row {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px; overflow: hidden;
  padding: 2px;
}
.mayor-avatar {
  width: clamp(18px, 3.5cqw, 32px);
  height: clamp(18px, 3.5cqw, 32px);
  border-radius: 50%;
  border: 1.5px solid var(--gold);
  background: var(--surface3);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(0.5rem, 1.2cqw, 0.72rem);
  font-weight: 800; color: var(--gold);
  overflow: hidden; flex-shrink: 0;
  object-fit: cover;
}
.mayor-label {
  font-size: clamp(0.38rem, 0.9cqw, 0.56rem);
  font-weight: 800; color: var(--gold);
  text-transform: uppercase; letter-spacing: 0.08em;
  line-height: 1; text-align: center;
}
.ob-side .mayor-row { writing-mode: horizontal-tb; }
.ob-side .mayor-avatar { writing-mode: horizontal-tb; }
.ob-side .mayor-label  { writing-mode: horizontal-tb; }

/* Side column text fix — all rotated text elements */
.ob-side .prop-name, .ob-side .plain-name,
.ob-side .prop-pts,  .ob-side .plain-pts { writing-mode: horizontal-tb; }

/* ── BAND DOTS ─────────────────────────────────────────────────────
   Always 4 dots inside the color band.
   Filled dots = completions so far (capped at 4 for display).
   Empty dots = remaining toward next star threshold marker.
   Dots are larger than before — clearly readable in the band.
──────────────────────────────────────────────────────────────────── */
.band-dots {
  display: flex; align-items: center; justify-content: center;
  gap: clamp(3px, 0.7cqw, 7px);
  width: 100%; height: 100%;
  position: absolute; inset: 0; z-index: 3; pointer-events: none;
}
.band-dot {
  width:  clamp(6px, 1.4cqw, 12px);
  height: clamp(6px, 1.4cqw, 12px);
  border-radius: 50%; flex-shrink: 0;
  transition: background 0.2s;
}
.band-dot.filled {
  background: rgba(255,255,255,0.92);
  box-shadow: 0 0 4px rgba(255,255,255,0.6);
}
.band-dot.empty {
  background: rgba(0,0,0,0.25);
  border: 1.5px solid rgba(255,255,255,0.45);
}
/* Side columns inherit horizontal-tb so dots stay circular */
.ob-side .band-dots { writing-mode: horizontal-tb; }

/* ── FOOTER STARS ──────────────────────────────────────────────────
   Gold stars earned, shown above the PTS row.
   One ★ per star threshold crossed (completionCount >= starThreshold).
   Empty star (☆) shown if threshold set but not yet earned.
──────────────────────────────────────────────────────────────────── */
.prop-stars {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; gap: 1px;
  padding: 1px 2px;
  line-height: 1;
}
.prop-star-earned {
  color: var(--gold);
  text-shadow: 0 0 6px var(--gold);
  font-size: clamp(0.55rem, 1.3cqw, 0.88rem);
}
.prop-star-empty {
  color: var(--gold-dim);
  font-size: clamp(0.55rem, 1.3cqw, 0.88rem);
}
.ob-side .prop-stars { writing-mode: horizontal-tb; }

/* ── OVERLAY PANEL ─────────────────────────────────────────────────
   Panel sits OVER the board (position:absolute inside .board-wrap).
   Always visible when open — never hidden behind board.
──────────────────────────────────────────────────────────────────── */
.side-panel {
  position: absolute;
  top: 0; right: 0;
  width: var(--panel-w);
  height: 100%;
  background: #0e0e0e;
  border: 1px solid var(--gold-dim);
  border-radius: 10px 0 0 10px;
  display: flex; flex-direction: column;
  overflow: hidden;
  /* Hidden state */
  opacity: 0;
  transform: translateX(100%);
  pointer-events: none;
  transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.4,0,0.2,1);
  z-index: 100;
  box-shadow: -8px 0 40px rgba(0,0,0,0.7);
}
.side-panel.open {
  opacity: 1;
  transform: translateX(0);
  pointer-events: all;
}

/* Panel header */
.panel-header {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--gold-dim);
  position: relative; display: flex; flex-direction: column; gap: 5px;
  flex-shrink: 0;
}
.panel-color-bar { position:absolute; top:0; left:0; right:0; height:5px; }
.panel-close {
  position:absolute; top:12px; right:14px;
  background:none; border:none; color:var(--text-dim);
  font-size:1.1rem; cursor:pointer; transition:color 0.2s; line-height:1;
}
.panel-close:hover { color:var(--gold); }
.panel-title { font-size:1rem; font-weight:800; color:var(--gold); line-height:1.2; padding-right:26px; margin-top:6px; }
.panel-type  { font-size:0.5rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dim); font-weight:600; }

.status-badge { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:20px; font-size:0.6rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; width:fit-content; margin-top:2px; }
.status-badge.passing    { background:rgba(76,175,80,0.15);  color:var(--pass);     border:1px solid rgba(76,175,80,0.4); }
.status-badge.pending    { background:rgba(255,152,0,0.15);  color:var(--pending-c);border:1px solid rgba(255,152,0,0.4); }
.status-badge.incomplete { background:rgba(100,100,100,0.1); color:var(--text-dim); border:1px solid rgba(100,100,100,0.25); }
.status-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.passing  .status-dot { background:var(--pass);     box-shadow:0 0 6px var(--pass); }
.pending  .status-dot { background:var(--pending-c);box-shadow:0 0 6px var(--pending-c);animation:pulse 1.4s ease infinite; }
.incomplete .status-dot { background:var(--text-dim); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

/* Panel body */
.panel-body {
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 12px;
  overflow-y: auto; flex: 1;
}
.panel-body::-webkit-scrollbar { width:4px; }
.panel-body::-webkit-scrollbar-track { background:#0e0e0e; }
.panel-body::-webkit-scrollbar-thumb { background:var(--gold-dim); border-radius:2px; }

.detail-row { display:flex; flex-direction:column; gap:4px; }
.detail-label { font-size:0.48rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-dim); font-weight:600; }
.detail-value { font-size:0.82rem; color:var(--text); line-height:1.5; }

.points-display {
  display:flex; align-items:center; gap:10px;
  background:var(--surface3); border:1px solid var(--gold-dim);
  border-radius:6px; padding:10px 14px;
}
.points-icon { font-size:1.4rem; }
.points-num  { font-size:1.6rem; color:var(--gold); line-height:1; font-weight:800; }
.points-num span { font-size:0.55em; color:var(--text-dim); font-weight:600; }
.points-label { font-size:0.48rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-dim); font-weight:600; margin-top:2px; }

.divider { height:1px; background:var(--gold-dim); opacity:0.25; }
.category-tag { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:4px; font-size:0.48rem; letter-spacing:0.14em; text-transform:uppercase; border:1px solid; width:fit-content; font-weight:700; }
.category-dot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
.entity-chip { display:inline-flex; align-items:center; gap:6px; background:var(--surface3); border:1px solid var(--gold-dim); border-radius:4px; padding:4px 8px; font-size:0.56rem; font-family:monospace; color:var(--text-dim); word-break:break-all; }
.entity-dot { width:6px; height:6px; border-radius:50%; background:var(--gold-dim); flex-shrink:0; }
.entity-dot.live { background:var(--pass); box-shadow:0 0 4px var(--pass); }

/* ── HISTORY CARDS — ops-dashboard CompletedItem style ──────────────
   Matching the green card from the screenshot exactly:
   border-left colored accent, icon+label row, task text, job title,
   employee name with checkmark, full date+time.
   NO delete/X button.
──────────────────────────────────────────────────────────────────── */
.history-section { display:flex; flex-direction:column; gap:6px; }
.history-title {
  font-size:0.58rem; font-weight:800; letter-spacing:0.16em;
  text-transform:uppercase; color:var(--text-dim); margin-bottom:2px;
}

/* The card itself — mirrors CompletedItem from ops dashboard */
.hist-card {
  display: flex; flex-direction: column; gap: 3px;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid;
  cursor: default;
  transition: box-shadow 0.15s;
}
.hist-card.passing  {
  background: rgba(76,175,80,0.08);
  border-color: rgba(76,175,80,0.35);
}
.hist-card.pending  {
  background: rgba(255,152,0,0.08);
  border-color: rgba(255,152,0,0.35);
}
.hist-card.incomplete {
  background: rgba(100,100,100,0.06);
  border-color: rgba(100,100,100,0.2);
}

/* Top row: status icon + label */
.hist-top {
  display: flex; align-items: center; gap: 6px; margin-bottom: 1px;
}
.hist-check {
  width: 14px; height: 14px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.5rem; flex-shrink: 0;
}
.hist-check.passing  { background: var(--pass);     color: #fff; }
.hist-check.pending  { background: var(--pending-c); color: #fff; }
.hist-check.incomplete { background: #555; color: #fff; }
.hist-status-label {
  font-size: 0.54rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em;
}
.hist-status-label.passing   { color: var(--pass); }
.hist-status-label.pending   { color: var(--pending-c); }
.hist-status-label.incomplete{ color: var(--text-dim); }

/* Task text */
.hist-task-text {
  font-size: 0.78rem; font-weight: 700; color: var(--text);
  line-height: 1.3;
}
/* Subtitle (job title equivalent) */
.hist-subtitle {
  font-size: 0.6rem; font-weight: 600; color: var(--text-dim);
}
/* Employee line */
.hist-employee {
  font-size: 0.62rem; font-weight: 700; color: var(--pass);
}
/* Full date + time */
.hist-datetime {
  font-size: 0.58rem; color: var(--text-dim); font-weight: 500;
}
/* Points badge on the right */
.hist-pts {
  font-size: 0.82rem; font-weight: 800; color: var(--gold);
  align-self: flex-start; margin-left: auto; padding-left: 8px;
  flex-shrink: 0;
}

/* ── US-09: VIEW TOGGLE BAR ─────────────────────────────────────────
   Sits between board and score bar.
   Team button on the left, employee pills on the right.
   Active pill highlights gold; team button highlights gold when active.
──────────────────────────────────────────────────────────────────── */
.view-toggle-bar {
  flex-shrink: 0;
  align-self: center;
  width: min(100%, calc(100vh - 80px));
  margin-top: 6px; margin-bottom: 2px;
}
.view-toggle-track {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2);
  border: 1.5px solid var(--gold-dim);
  border-radius: 8px;
  padding: 5px 10px;
  overflow-x: auto;
}
.view-toggle-track::-webkit-scrollbar { height: 0; }

.view-toggle-btn {
  flex-shrink: 0;
  background: none; border: 1.5px solid var(--gold-dim);
  border-radius: 6px; padding: 4px 12px;
  color: var(--text-dim); font-family: inherit;
  font-size: 0.62rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; transition: all 0.18s;
  white-space: nowrap;
}
.view-toggle-btn:hover { border-color: var(--gold); color: var(--gold); }
.view-toggle-btn.active {
  background: var(--gold); border-color: var(--gold);
  color: #000; font-weight: 800;
}

.view-toggle-divider {
  flex-shrink: 0; width: 1px; height: 18px;
  background: var(--gold-dim); opacity: 0.5;
}
.view-toggle-label {
  flex-shrink: 0;
  font-size: 0.58rem; font-weight: 600;
  color: var(--text-dim); letter-spacing: 0.08em;
  text-transform: uppercase; white-space: nowrap;
}

/* Employee pills */
.emp-pills {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: nowrap;
}

/* ── DIGIT REEL DISPLAY ─────────────────────────────────────────────
   Each number is broken into individual digit cells.
   Each cell shows one digit on a "reel" that tumbles up or down.
   Right-most digit locks first; digits settle left-to-right.
   Elastic overshoot on landing. Heavy motion blur during spin.
──────────────────────────────────────────────────────────────────── */
.reel-display {
  display: flex; align-items: center; gap: 2px;
  justify-content: flex-end;
}
.reel-sep {
  /* Comma separator between digit groups */
  font-size: clamp(1.4rem, 3.8vw, 2.4rem);
  font-weight: 900; color: var(--gold);
  line-height: 1; align-self: flex-end; padding-bottom: 1px;
  user-select: none;
}
.reel-cell {
  position: relative;
  width:  clamp(22px, 5.5vw, 38px);
  height: clamp(38px, 9vw,   62px);
  min-height: clamp(38px, 9vw, 62px); /* prevents offsetHeight:0 race */
  overflow: hidden;
  background: #0a0807;
  border: 1.5px solid var(--gold-dim);
  border-radius: 4px;
  box-shadow: inset 0 3px 8px rgba(0,0,0,0.7),
              inset 0 -3px 8px rgba(0,0,0,0.4);
}
/* Highlight line across top — the "read window" */
.reel-cell::before {
  content: '';
  position: absolute; top: 35%; left: 0; right: 0;
  height: 1px; background: rgba(201,168,76,0.35);
  z-index: 4; pointer-events: none;
}
.reel-cell::after {
  content: '';
  position: absolute; bottom: 35%; left: 0; right: 0;
  height: 1px; background: rgba(201,168,76,0.35);
  z-index: 4; pointer-events: none;
}
/* The moving strip inside the cell */
.reel-strip {
  position: absolute;
  left: 0; right: 0;
  display: flex; flex-direction: column;
  align-items: center;
  will-change: transform;
}
.reel-digit {
  width: 100%;
  height: clamp(38px, 9vw, 62px);
  min-height: clamp(38px, 9vw, 62px);
  display: flex; align-items: center; justify-content: center;
  /* Monospace guarantees every digit is identical width (Gemini fix #4) */
  font-family: 'Courier New', 'Lucida Console', monospace;
  font-size: clamp(1.4rem, 3.8vw, 2.4rem);
  font-weight: 900; color: var(--gold);
  font-variant-numeric: tabular-nums;
  line-height: 1; user-select: none;
  flex-shrink: 0;
}
/* Fade mask top + bottom of each cell — hides off-screen digits */
.reel-cell .reel-mask-top,
.reel-cell .reel-mask-bottom {
  position: absolute; left: 0; right: 0; height: 35%;
  z-index: 3; pointer-events: none;
}
.reel-cell .reel-mask-top    { top: 0;
  background: linear-gradient(to bottom, #0a0807 0%, transparent 100%); }
.reel-cell .reel-mask-bottom { bottom: 0;
  background: linear-gradient(to top, #0a0807 0%, transparent 100%); }

/* Bottom bar */
.intro-bottom {
  width: 100%; max-width: 560px;
  display: flex; align-items: center; gap: 14px;
  margin-top: 14px; flex-shrink: 0;
}

}

/* Replay button — fixed bottom-right after intro closes */

/* ── HEADCOUNT CHANGE BADGE ─────────────────────────────────────────
   Springs in during education sequence.
   Green = alumni  (productivity up — good for bonus)
   Red   = new hire (productivity dn — pool diluted per person)

  animation: badgeIconBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
}
@keyframes badgePop {
  0%   { opacity:0; transform:scale(0.4) translateY(18px); }
  100% { opacity:1; transform:scale(1)   translateY(0); }
}
@keyframes badgeIconBounce {
  0%   { transform:rotate(-15deg) scale(0.6); }
  60%  { transform:rotate(10deg)  scale(1.25); }
  100% { transform:rotate(0deg)   scale(1); }
}
@keyframes badgeFadeUp {
  0%   { opacity:1; transform:scale(1)    translateY(0); }
  100% { opacity:0; transform:scale(0.85) translateY(-14px); }
}
</style>

/* ════════════════════════════════════════════════════════════════════
   US-01 · DERIVATION FUNCTIONS
   All game state is computed fresh from raw data on every load.
   Nothing is stored as derived state — it's always recalculated.
════════════════════════════════════════════════════════════════════ */

/* Build a lookup index: entity string → SPACE_CONFIG entry */
const SPACE_BY_ENTITY = {};
SPACE_CONFIG.forEach(sc => { SPACE_BY_ENTITY[sc.entity] = sc; });

/* Build a lookup index: space id → SPACE_CONFIG entry */
const SPACE_BY_ID = {};
SPACE_CONFIG.forEach(sc => { SPACE_BY_ID[sc.id] = sc; });

/* ── Days since last OA (from STORE_CONFIG.last_oa_date) ── */
function daysSinceLastOA() {
  const last = new Date(STORE_CONFIG.last_oa_date);
  const today = new Date();
  return Math.floor((today - last) / (1000 * 60 * 60 * 24));
}

/* ── 30-day rolling average headcount ── */
function avg30DayHeadcount() {
  const today = new Date();
  const cutoff = new Date(today);
  cutoff.setDate(today.getDate() - 30);
  let recent = HEADCOUNT_LOG.filter(e => new Date(e.date) >= cutoff);
  /* Fallback: if no entries in last 30 days, use the most recent 30 entries available */
  if (!recent.length) {
    recent = [...HEADCOUNT_LOG]
      .sort((a, b) => new Date(b.date) - new Date(a.date))
      .slice(0, 30);
  }
  if (!recent.length) return 0;
  return Math.round(recent.reduce((s, e) => s + e.count, 0) / recent.length * 10) / 10;
}

/* ── Completions per employee per space ──
   Returns count of completions for a given employee + space entity. */
function completionCount(emp, entity) {
  return emp.completions.filter(c => c.entity === entity).length;
}

/* ── All completions for a space across all employees ──
   Returns array of { emp, count, timestamps } sorted by count desc,
   then by start_date asc (earliest tenure wins ties). */
function spaceLeaderboard(spaceId) {
  const sc = SPACE_BY_ID[spaceId];
  if (!sc) return [];
  return EMPLOYEES
    .map(emp => ({
      emp,
      count: completionCount(emp, sc.entity),
      timestamps: emp.completions
        .filter(c => c.entity === sc.entity)
        .map(c => c.timestamp)
        .sort()
    }))
    .filter(row => row.count > 0)
    .sort((a, b) => {
      if (b.count !== a.count) return b.count - a.count;          /* most completions first */
      return new Date(a.emp.start_date) - new Date(b.emp.start_date); /* earliest tenure wins */
    });
}

/* ── Mayor of a space ──
   The employee with the most completions; tie → earliest start_date. */
function getMayor(spaceId) {
  const board = spaceLeaderboard(spaceId);
  return board.length > 0 ? board[0].emp : null;
}

/* ── Total completions for a space (all employees) ── */
function totalCompletions(spaceId) {
  const sc = SPACE_BY_ID[spaceId];
  if (!sc) return 0;
  return EMPLOYEES.reduce((sum, emp) => sum + completionCount(emp, sc.entity), 0);
}

/* ── Total points earned for a space (all employees) ── */
function totalPointsEarned(spaceId) {
  const sc = SPACE_BY_ID[spaceId];
  if (!sc) return 0;
  return totalCompletions(spaceId) * sc.pts_per_completion;
}

/* ── Stars earned by an employee on a space ──
   floor(completionCount / star_threshold) */
function starsEarned(emp, spaceId) {
  const sc = SPACE_BY_ID[spaceId];
  if (!sc || sc.star_threshold === 0) return 0;
  return Math.floor(completionCount(emp, sc.entity) / sc.star_threshold);
}

/* ── Release date display string ── */
function releaseDisplay(sc) {
  if (sc.release_date) {
    return new Date(sc.release_date).toLocaleDateString('en-US',
      { month:'long', day:'numeric', year:'numeric' });
  }
  if (sc.release_label) return sc.release_label;
  return 'Coming Soon';
}

/* ── OA Bonus calculations ──────────────────────────────────────────
   Daily rate scales with headcount vs baseline:
     - At or above baseline → base rate ($25)
     - Each teammate below baseline → +$25/day (productivity bonus)
     - Above baseline → rate stays at base (no penalty, no bonus)

   Pool  = days since last OA × effective daily rate
   Share = pool ÷ current headcount

   calcDailyRate(n) is exposed so the intro education sequence
   can compute hypothetical rates for +1/-1 headcount scenarios.
─────────────────────────────────────────────────────────────────── */
function calcDailyRate(headcount) {
  const base     = STORE_CONFIG.daily_piggybank_rate;
  const baseline = STORE_CONFIG.baseline_headcount;
  /* Each teammate vs baseline shifts the rate by ±$base:
     - Below baseline (fewer people): +$base per missing teammate
     - Above baseline (more people):  -$base per extra teammate, floor 0
     At baseline: exactly base rate. */
  const delta = baseline - headcount; /* positive = below, negative = above */
  return Math.max(0, base + delta * base);
}

function calcOABonusPool(headcount) {
  const hc = headcount !== undefined ? headcount : Math.round(avg30DayHeadcount());
  return daysSinceLastOA() * calcDailyRate(hc);
}

function calcOABonusPerTeammate(headcount) {
  const hc   = headcount !== undefined ? headcount : Math.round(avg30DayHeadcount());
  const pool = calcOABonusPool(hc);
  if (!hc) return 0;
  return Math.round(pool / hc);
}

function calcTotalOABonus() {
  return calcOABonusPool();
}

/* ── Full date + time formatter ── */
function fmtDateTime(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US',
    { weekday:'short', month:'short', day:'numeric', year:'numeric' })
    + ' · ' + d.toLocaleTimeString('en-US',
    { hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true });
}

const DONE = new Set(
  SPACES
    .filter(s => s.type === 'property' && s.active && s.star_threshold > 0)
    .filter(s => EMPLOYEES.some(e =>
      Math.floor(completionCount(e, s.entity) / s.star_threshold) > 0
    ))
    .map(s => s.id)
);

const TYPE_LABELS = {
  property:'OA Task', railroad:'Railroad Bonus', utility:'Utility Bonus',
  chest:'Community Chest', chance:'Chance', tax:'Tax Space',
};

function gridPos(id) {
  if (id >= 0  && id <= 10) return {row:11,    col:11-id };
  if (id >= 11 && id <= 20) return {row:21-id, col:1     };
  if (id >= 21 && id <= 30) return {row:1,     col:id-19 };
  if (id >= 31 && id <= 39) return {row:id-29, col:11    };
}

function buildCorner(s) {
  const pos = gridPos(s.id);
  const div = document.createElement('div');
  div.className = 'ob-corner';
  div.style.gridRow = pos.row; div.style.gridColumn = pos.col;
  div.innerHTML = `<div class="c-icon">${s.icon}</div><div class="c-label">${s.label}</div>`;
  return div;
}

/* ── US-04 · US-05 · US-06 · US-07 ───────────────────────────────────
   buildProperty handles three visual states:

   1. UNRELEASED (US-04): active=false
      Band dimmed, name muted, release date on line 2.
      No dots, no stars, no pts.

   2. ACTIVE — TEAM VIEW (US-05 + US-06):
      Full band with 4 dots, name, then MAYOR block (avatar + label),
      total team PTS EARNED at bottom.

   Mayor is computed via getMayor(spaceId) → spaceLeaderboard(),
   tiebreak = earliest start_date (US-07).
──────────────────────────────────────────────────────────────────── */
function buildProperty(s) {
  const pos    = gridPos(s.id);
  const isSide = (s.rot === 90 || s.rot === -90);
  const sc     = SPACE_BY_ID[s.id] || s;
  const isActive = !!sc.active;

  const div = document.createElement('div');
  div.dataset.id  = s.id;
  div.dataset.rot = s.rot;
  div.style.gridRow    = pos.row;
  div.style.gridColumn = pos.col;

  /* ══════════════════════════════════════════════
     US-04 — UNRELEASED TILE
  ══════════════════════════════════════════════ */
  if (!isActive) {
    div.className = `space unreleased${isSide ? ' ob-side' : ''}`;

    const inner = document.createElement('div');
    inner.className = 'inner';

    /* Dimmed color band — no dots */
    const band = document.createElement('div');
    band.className = 'prop-band-unreleased';
    band.style.background = sc.color || 'var(--surface3)';

    /* Name + release date block */
    const nameBlock = document.createElement('div');
    nameBlock.className = 'prop-name-unreleased';
    nameBlock.style.flex = '1';

    const lbl = document.createElement('div');
    lbl.className = 'pnu-label';
    lbl.textContent = (sc.label || s.label || '').toUpperCase();

    const date = document.createElement('div');
    date.className = 'pnu-date';
    date.textContent = releaseDisplay(sc);

    nameBlock.appendChild(lbl);
    nameBlock.appendChild(date);

    inner.appendChild(band);
    inner.appendChild(nameBlock);
    div.appendChild(inner);
    div.addEventListener('click', () => openPanel(s));
    return div;
  }

  /* ══════════════════════════════════════════════
     US-05 + US-06 — ACTIVE TILE
     Branches on activeView:
       'team'  → mayor + team PTS EARNED  (US-06)
       emp.id  → personal dots + stars    (US-08)
  ══════════════════════════════════════════════ */
  const hasStar = DONE.has(s.id);
  const mayor   = getMayor(s.id);
  const teamPts = totalPointsEarned(s.id);

  /* For individual view — find the active employee */
  const viewEmp  = activeView !== 'team'
    ? EMPLOYEES.find(e => e.id === activeView) : null;
  const empCount = viewEmp ? completionCount(viewEmp, sc.entity) : 0;
  const empFilled = Math.min(empCount, 4);
  const empStars  = viewEmp ? starsEarned(viewEmp, s.id) : 0;

  /* Dot fill: team view = all completions capped at 4,
               individual = that employee's completions capped at 4 */
  const total  = totalCompletions(s.id);
  const filled = viewEmp ? empFilled : Math.min(total, 4);

  div.className = `space ob-property${hasStar ? ' completed' : ''}${isSide ? ' ob-side' : ''}`;

  const inner = document.createElement('div');
  inner.className = 'inner';

  /* ── Band: 4 dots ── */
  const band = document.createElement('div');
  band.className = 'prop-band';
  band.style.background = sc.color || s.color;
  const dotsWrap = document.createElement('div');
  dotsWrap.className = 'band-dots';
  for (let i = 0; i < 4; i++) {
    const dot = document.createElement('span');
    dot.className = `band-dot ${i < filled ? 'filled' : 'empty'}`;
    dotsWrap.appendChild(dot);
  }
  band.appendChild(dotsWrap);

  /* ── Name ── */
  const name = document.createElement('div');
  name.className = 'prop-name';
  name.textContent = (sc.label || s.label || '').toUpperCase();

  /* ── Middle row: Mayor (team) or Stars (individual) ── */
  const middleRow = document.createElement('div');

  if (viewEmp) {
    /* US-08 — INDIVIDUAL VIEW: show personal star progress */
    middleRow.className = 'prop-stars';
    if (sc.star_threshold > 0) {
      if (empStars > 0) {
        for (let i = 0; i < empStars; i++) {
          const st = document.createElement('span');
          st.className = 'prop-star-earned'; st.textContent = '★';
          middleRow.appendChild(st);
        }
      } else {
        const st = document.createElement('span');
        st.className = 'prop-star-empty'; st.textContent = '☆';
        middleRow.appendChild(st);
      }
    }
  } else {
    /* US-06 — TEAM VIEW: show mayor */
    middleRow.className = 'mayor-row';
    if (mayor) {
      const av = document.createElement('div');
      av.className = 'mayor-avatar';
      const initials = mayor.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      av.textContent = initials;
      if (mayor.avatar_url) {
        const img = document.createElement('img');
        img.src = mayor.avatar_url;
        img.style.cssText = 'width:100%;height:100%;border-radius:50%;object-fit:cover;';
        img.onload  = () => { av.textContent = ''; av.appendChild(img); };
        img.onerror = () => {};
      }
      const mayorLbl = document.createElement('div');
      mayorLbl.className = 'mayor-label';
      mayorLbl.textContent = 'MAYOR';
      middleRow.appendChild(av);
      middleRow.appendChild(mayorLbl);
    } else {
      const st = document.createElement('span');
      st.className = 'prop-star-empty'; st.textContent = '☆';
      middleRow.appendChild(st);
    }
  }

  /* ── PTS row: team = total earned, individual = personal earned ── */
  const pts = document.createElement('div');
  pts.className = 'prop-pts';
  if (viewEmp) {
    const personalPts = empCount * (sc.pts_per_completion || 0);
    pts.textContent = personalPts > 0
      ? `${personalPts} PTS EARNED` : `${sc.pts_per_completion || 0} PTS`;
  } else {
    pts.textContent = teamPts > 0
      ? `${teamPts} PTS EARNED` : `${sc.pts_per_completion || 0} PTS`;
  }

  inner.appendChild(band);
  inner.appendChild(name);
  inner.appendChild(middleRow);
  inner.appendChild(pts);
  div.appendChild(inner);
  div.addEventListener('click', () => openPanel(s));
  return div;
}

function buildPlain(s) {
  const pos    = gridPos(s.id);
  const isSide = (s.rot === 90 || s.rot === -90);

  const div = document.createElement('div');
  div.className = `space ob-plain${isSide ? ' ob-side' : ''}`;
  div.dataset.id = s.id; div.dataset.rot = s.rot;
  div.style.gridRow = pos.row; div.style.gridColumn = pos.col;

  const inner = document.createElement('div');
  inner.className = 'inner';

  const name = document.createElement('div');
  name.className = 'plain-name';
  name.textContent = (s.label || '').toUpperCase();

  const pts = document.createElement('div');
  pts.className = 'plain-pts';
  pts.textContent = (s.pts_per_completion || s.pts || 0) > 0
    ? (s.pts_per_completion || s.pts) + ' PTS' : '';

  inner.appendChild(name); inner.appendChild(pts);
  div.appendChild(inner);
  div.addEventListener('click', () => openPanel(s));
  return div;
}

function applyRotations() {
  document.querySelectorAll('.space[data-rot]').forEach(el => {
    const rot   = parseInt(el.dataset.rot);
    const inner = el.querySelector('.inner');
    if (!inner) return;
    const cw = el.offsetWidth, ch = el.offsetHeight;
    if (!cw || !ch) return;
    if (rot === 0) {
      inner.style.cssText = `position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:stretch;transform:rotate(0deg);`;
    } else if (rot === 180) {
      inner.style.cssText = `position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:stretch;transform:rotate(180deg);`;
    } else {
      const adj = rot === -90 ? 90 : -90;
      inner.style.cssText = `position:absolute;top:50%;left:50%;width:${ch}px;height:${cw}px;display:flex;flex-direction:column;align-items:stretch;transform:translate(-50%,-50%) rotate(${adj}deg);`;
    }
  });
}

/* ── PANEL — US-08 (individual) + US-10 (team leaderboard) ──────── */
function openPanel(s) {
  document.querySelectorAll('.space.active-sel').forEach(el => el.classList.remove('active-sel'));
  const el = document.querySelector(`.space[data-id="${s.id}"]`);
  if (el) el.classList.add('active-sel');

  const sc       = SPACE_BY_ID[s.id] || s;
  const entity   = sc.entity || `ollieboard.oa_space_${s.id}`;
  const isActive = !!sc.active;

  /* Who is viewing? */
  const viewEmp = activeView !== 'team'
    ? EMPLOYEES.find(e => e.id === activeView) : null;

  document.getElementById('panelColorBar').style.background = sc.color || 'var(--gold-dim)';
  document.getElementById('panelTitle').textContent  = (sc.label || s.label).toUpperCase();
  document.getElementById('panelType').textContent   =
    (viewEmp ? `${viewEmp.name.split(' ')[0]}'s View · ` : 'Team View · ') +
    (TYPE_LABELS[s.type] || s.type);
  document.getElementById('panelStatus').innerHTML   =
    isActive
      ? `<span class="status-badge passing"><span class="status-dot"></span>Active</span>`
      : `<span class="status-badge incomplete"><span class="status-dot"></span>Coming ${releaseDisplay(sc)}</span>`;

  /* ── Shared: category tag ── */
  const categoryHTML = sc.color ? `
    <div class="detail-row">
      <div class="detail-label">Job Category</div>
      <span class="category-tag" style="color:${sc.color};border-color:${sc.color}44">
        <span class="category-dot" style="background:${sc.color}"></span>${TYPE_LABELS[s.type]}
      </span>
    </div><div class="divider"></div>` : '';

  /* ── Shared: description ── */
  const descHTML = `
    <div class="detail-row">
      <div class="detail-label">Description</div>
      <div class="detail-value">${sc.desc || '—'}</div>
    </div><div class="divider"></div>`;

  /* ── Shared: entity chip ── */
  const entityHTML = `
    <div class="detail-row">
      <div class="detail-label">OllieBoard Entity</div>
      <div class="entity-chip">
        <span class="entity-dot ${isActive ? 'live' : ''}"></span>${entity}
      </div>
    </div>`;

  if (!isActive) {
    /* US-11: unreleased space — minimal panel */
    document.getElementById('panelBody').innerHTML =
      categoryHTML + descHTML + entityHTML;
    document.getElementById('sidePanel').classList.add('open');
    return;
  }

  /* ══════════════════════════════════════════════
     TEAM VIEW panel — tab 1: Leaderboard, tab 2: All Completions (paginated)
  ══════════════════════════════════════════════ */
  if (!viewEmp) {
    const board   = spaceLeaderboard(s.id);
    const ptTotal = totalPointsEarned(s.id);
    const medals  = ['🥇','🥈','🥉'];

    /* ── Tab 1: Leaderboard rows ── */
    const lbRowsHTML = board.length > 0
      ? board.map((row, i) => {
          const rank     = i + 1;
          const cls      = rank <= 3 ? ` lb-${rank}` : '';
          const medal    = medals[i] || `${rank}`;
          const stars    = starsEarned(row.emp, s.id);
          const starsStr = stars > 0 ? '★'.repeat(stars) : '';
          const initials = row.emp.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
          const avatarInner = row.emp.avatar_url
            ? `<img src="${row.emp.avatar_url}" onerror="this.style.display='none';this.parentNode.textContent='${initials}'">`
            : initials;
          return `
            <div class="lb-row${cls}">
              <span class="lb-rank">${medal}</span>
              <div class="lb-avatar">${avatarInner}</div>
              <div class="lb-name">${row.emp.name}</div>
              ${i === 0 ? '<span class="lb-mayor-badge">Mayor</span>' : ''}
              ${starsStr ? `<span class="lb-stars">${starsStr}</span>` : ''}
              <div>
                <span class="lb-count">${row.count}</span>
                <span class="lb-count-label">completions</span>
              </div>
            </div>`;
        }).join('')
      : `<div class="hist-empty">No completions yet</div>`;

    /* Star progress — leader */
    const leader  = board[0];
    const starHTML = sc.star_threshold > 0 && leader ? `
      <div class="detail-row">
        <div class="detail-label">Gold Star Progress — ${leader.emp.name} (Leader)</div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
          <div style="flex:1;background:var(--surface3);border-radius:4px;height:6px;overflow:hidden;">
            <div style="height:100%;background:var(--gold);border-radius:4px;
              width:${Math.min(100,Math.round(leader.count/sc.star_threshold*100))}%;
              transition:width 0.6s;"></div>
          </div>
          <span style="font-size:0.72rem;font-weight:800;color:${starsEarned(leader.emp,s.id)>0?'var(--gold)':'var(--text-dim)'};">
            ${starsEarned(leader.emp,s.id)>0 ? '★ Earned' : `${leader.count} / ${sc.star_threshold}`}
          </span>
        </div>
        <div style="font-size:0.48rem;color:var(--text-dim);margin-top:4px;letter-spacing:0.1em;text-transform:uppercase;">
          Completions to earn gold star
        </div>
      </div>` : '';

    /* ── All completions across all employees, newest first ── */
    const allEntries = EMPLOYEES.flatMap(emp =>
      emp.completions
        .filter(c => c.entity === entity)
        .map(c => ({ emp, timestamp: c.timestamp }))
    ).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

    /* Build tab HTML — tab 2 content rendered by JS pagination after inject */
    const panelHTML = `
      ${categoryHTML}
      ${descHTML}
      <div class="points-display">
        <div class="points-icon">🏆</div>
        <div>
          <div class="points-num">${ptTotal}</div>
          <div class="points-label">Total Points Earned Since Last OA</div>
        </div>
      </div>
      <div class="panel-tabs">
        <button class="panel-tab active" id="tabLb" onclick="switchTab('lb')">🏅 Leaderboard</button>
        <button class="panel-tab" id="tabHist" onclick="switchTab('hist')">📋 All Completions (${allEntries.length})</button>
      </div>
      <div class="tab-pane active" id="paneLb">
        <div class="leaderboard">${lbRowsHTML}</div>
        <div class="divider"></div>
        ${starHTML}
        <div class="divider"></div>
        ${entityHTML}
      </div>
      <div class="tab-pane" id="paneHist">
        <div id="histList"></div>
        <div class="pagination" id="histPagination"></div>
        <div class="divider"></div>
        ${entityHTML}
      </div>`;

    document.getElementById('panelBody').innerHTML = panelHTML;

    /* Store completions on panel for pagination access */
    const panel = document.getElementById('sidePanel');
    panel._allEntries   = allEntries;
    panel._histPage     = 0;
    panel._histPageSize = 5;
    panel._sc           = sc;
    renderHistPage();          /* render first page immediately */

  } else {
    /* ══════════════════════════════════════════════
       INDIVIDUAL VIEW panel — tab 1: Summary, tab 2: My Completions (paginated)
    ══════════════════════════════════════════════ */
    const empCount = completionCount(viewEmp, entity);
    const empPts   = empCount * (sc.pts_per_completion || 0);
    const empStars = starsEarned(viewEmp, s.id);
    const nextStar = sc.star_threshold > 0
      ? sc.star_threshold - (empCount % sc.star_threshold || sc.star_threshold) : null;

    const starPct = sc.star_threshold > 0
      ? Math.min(100, Math.round(
          ((empCount % sc.star_threshold) || (empStars > 0 ? sc.star_threshold : 0))
          / sc.star_threshold * 100))
      : 0;

    const myEntries = viewEmp.completions
      .filter(c => c.entity === entity)
      .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

    const starHTML = sc.star_threshold > 0 ? `
      <div class="detail-row">
        <div class="detail-label">Gold Star Progress</div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
          <div style="flex:1;background:var(--surface3);border-radius:4px;height:6px;overflow:hidden;">
            <div style="height:100%;background:var(--gold);border-radius:4px;width:${starPct}%;transition:width 0.6s;"></div>
          </div>
          <span style="font-size:0.72rem;font-weight:800;color:${empStars>0?'var(--gold)':'var(--text-dim)'};">
            ${empStars > 0 ? `${'★'.repeat(empStars)} Earned` : `${empCount % sc.star_threshold || 0} / ${sc.star_threshold}`}
          </span>
        </div>
        ${nextStar && empStars === 0 ? `<div style="font-size:0.48rem;color:var(--text-dim);margin-top:4px;letter-spacing:0.1em;text-transform:uppercase;">${nextStar} more completion${nextStar!==1?'s':''} to next ★</div>` : ''}
      </div>` : '';

    const panelHTML = `
      ${categoryHTML}
      ${descHTML}
      <div class="points-display">
        <div class="points-icon">🏆</div>
        <div>
          <div class="points-num">${empPts}</div>
          <div class="points-label">${viewEmp.name.split(' ')[0]}'s Points Since Last OA</div>
        </div>
      </div>
      <div class="panel-tabs">
        <button class="panel-tab active" id="tabLb" onclick="switchTab('lb')">⭐ Summary</button>
        <button class="panel-tab" id="tabHist" onclick="switchTab('hist')">📋 My Completions (${myEntries.length})</button>
      </div>
      <div class="tab-pane active" id="paneLb">
        ${starHTML}
        <div class="divider"></div>
        ${entityHTML}
      </div>
      <div class="tab-pane" id="paneHist">
        <div id="histList"></div>
        <div class="pagination" id="histPagination"></div>
        <div class="divider"></div>
        ${entityHTML}
      </div>`;

    document.getElementById('panelBody').innerHTML = panelHTML;

    const panel = document.getElementById('sidePanel');
    panel._allEntries   = myEntries.map(c => ({ emp: viewEmp, timestamp: c.timestamp }));
    panel._histPage     = 0;
    panel._histPageSize = 5;
    panel._sc           = sc;
    renderHistPage();
  }

  document.getElementById('sidePanel').classList.add('open');
}

/* ── Tab switching ── */
function switchTab(tab) {
  const lb   = document.getElementById('tabLb');
  const hist = document.getElementById('tabHist');
  const paneLb   = document.getElementById('paneLb');
  const paneHist = document.getElementById('paneHist');
  if (!lb || !hist) return;

  if (tab === 'lb') {
    lb.classList.add('active');   hist.classList.remove('active');
    paneLb.classList.add('active'); paneHist.classList.remove('active');
  } else {
    hist.classList.add('active'); lb.classList.remove('active');
    paneHist.classList.add('active'); paneLb.classList.remove('active');
  }
}

/* ── Paginated history renderer ──
   Reads panel._allEntries, panel._histPage, panel._histPageSize, panel._sc
   Renders the current page of completion cards into #histList
   and prev/next controls into #histPagination.               */
function renderHistPage() {
  const panel    = document.getElementById('sidePanel');
  const entries  = panel._allEntries  || [];
  const pageSize = panel._histPageSize || 5;
  const page     = panel._histPage    || 0;
  const sc       = panel._sc          || {};
  const total    = entries.length;
  const pages    = Math.max(1, Math.ceil(total / pageSize));
  const start    = page * pageSize;
  const slice    = entries.slice(start, start + pageSize);

  const listEl = document.getElementById('histList');
  const pgEl   = document.getElementById('histPagination');
  if (!listEl || !pgEl) return;

  /* Render cards for this page */
  listEl.innerHTML = slice.length > 0
    ? slice.map(({ emp, timestamp }) => `
        <div class="hist-card passing">
          <div class="hist-top">
            <span class="hist-check passing">✓</span>
            <span class="hist-status-label passing">Task Complete</span>
            <span class="hist-pts">+${sc.pts_per_completion || 0}</span>
          </div>
          <div class="hist-task-text">${sc.label || ''} — ${sc.desc ? sc.desc.split('—')[0].trim() : 'Completed'}</div>
          <div class="hist-subtitle">${TYPE_LABELS[sc.type || 'property'] || 'OA Task'}</div>
          <div class="hist-employee">✓ ${emp.name}</div>
          <div class="hist-datetime">${fmtDateTime(timestamp)}</div>
        </div>`).join('')
    : `<div class="hist-empty">No completions recorded yet</div>`;

  /* Render pagination controls */
  pgEl.innerHTML = total > pageSize ? `
    <button class="pg-btn" onclick="changePage(-1)" ${page === 0 ? 'disabled' : ''}>← Prev</button>
    <span class="pg-info">Page ${page + 1} of ${pages} &middot; ${total} total</span>
    <button class="pg-btn" onclick="changePage(1)" ${page >= pages - 1 ? 'disabled' : ''}>Next →</button>
  ` : `<span class="pg-info">${total} completion${total !== 1 ? 's' : ''}</span>`;
}

function changePage(delta) {
  const panel  = document.getElementById('sidePanel');
  const total  = (panel._allEntries || []).length;
  const pages  = Math.max(1, Math.ceil(total / (panel._histPageSize || 5)));
  panel._histPage = Math.min(pages - 1, Math.max(0, (panel._histPage || 0) + delta));
  renderHistPage();
  /* Scroll hist pane back to top */
  const pane = document.getElementById('paneHist');
  if (pane) pane.scrollTop = 0;
}

function closePanel() {
  document.querySelectorAll('.space.active-sel').forEach(el => el.classList.remove('active-sel'));
  document.getElementById('sidePanel').classList.remove('open');
}
document.getElementById('panelClose').addEventListener('click', closePanel);

/* ════════════════════════════════════════════════════════════════════
   US-09 · VIEW STATE
   activeView: 'team' | emp.id string
   All property tile rendering branches on this.
════════════════════════════════════════════════════════════════════ */
let activeView = 'team';   /* default: team view */

/* ── Build employee pill strip ── */
function buildEmpPills() {
  const container = document.getElementById('empPills');
  container.innerHTML = '';
  EMPLOYEES.forEach(emp => {
    const pill = document.createElement('button');
    pill.className = `emp-pill${activeView === emp.id ? ' active' : ''}`;
    pill.dataset.empId = emp.id;
    pill.onclick = () => setView(emp.id);

    /* Avatar */
    const av = document.createElement('div');
    av.className = 'emp-pill-avatar';
    const initials = emp.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    av.textContent = initials;
    if (emp.avatar_url) {
      const img = document.createElement('img');
      img.src = emp.avatar_url;
      img.onload  = () => { av.textContent = ''; av.appendChild(img); };
      img.onerror = () => {};
    }

    /* Name (first name only for pill brevity) */
    const lbl = document.createElement('span');
    lbl.className = 'emp-pill-name';
    lbl.textContent = emp.name.split(' ')[0];

    pill.appendChild(av); pill.appendChild(lbl);
    container.appendChild(pill);
  });
}

/* ── Switch view and re-render all property tiles ── */
function setView(view) {
  activeView = view;

  /* Update team button state */
  document.getElementById('btnTeam').classList.toggle('active', view === 'team');

  /* Update pill active states */
  document.querySelectorAll('.emp-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.empId === view);
  });

  /* Update label */
  const label = document.getElementById('viewToggleLabel');
  if (view === 'team') {
    label.textContent = 'Viewing: Team';
  } else {
    const emp = EMPLOYEES.find(e => e.id === view);
    label.textContent = `Viewing: ${emp ? emp.name.split(' ')[0] : view}`;
  }

  /* Close panel — stale content */
  document.getElementById('sidePanel').classList.remove('open');

  /* Re-render all property spaces in-place */
  rerenderPropertySpaces();
}

/* ── Re-render property tiles without full board rebuild ──
   Finds each existing .space element, replaces it with a freshly
   built tile that reflects the current activeView.               */
function rerenderPropertySpaces() {
  SPACES.forEach(s => {
    if (s.type !== 'property') return;
    const existing = document.querySelector(`.space[data-id="${s.id}"]`);
    if (!existing) return;
    const fresh = buildProperty(s);
    existing.replaceWith(fresh);
  });
  /* Re-apply rotations to the new elements */
  requestAnimationFrame(applyRotations);
}


/* ════════════════════════════════════════════════════════════════════
   US-12 + US-13 · INTRO SCREEN LOGIC
════════════════════════════════════════════════════════════════════ */

/* ════════════════════════════════════════════════════════════════════
   US-12 REEL ENGINE
   Digit-reel slot machine with:
   - Individual vertical cells per digit
   - Alternating up/down tumble directions per cell
   - Right-to-left staggered lock order
   - Elastic overshoot (spring) on landing
   - Motion blur during spin via CSS filter
   - Web Audio API click/tick sounds
   - Headcount-last reveal sequence with bonus recalc
════════════════════════════════════════════════════════════════════ */

/* ── Audio context (lazy init on first user gesture or show) ── */
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return _audioCtx;
}

/* ── Single mechanical click sound ── */
function playTick(freq = 180, vol = 0.18, dur = 0.04) {
  const ctx = getAudioCtx(); if (!ctx) return;
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type      = 'square';
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.4, ctx.currentTime + dur);
  gain.gain.setValueAtTime(vol, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + dur + 0.01);
}

/* ── Lock sound — heavier thunk when digit settles ── */
function playLock(index = 0) {
  const ctx = getAudioCtx(); if (!ctx) return;
  /* Pitched descending across digits: right=high, left=low */
  const baseFreq = 320 - index * 18;
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(baseFreq, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.3, ctx.currentTime + 0.12);
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.14);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.16);
}

/* ── Final chime when all reels locked ── */
function playChime() {
  const ctx = getAudioCtx(); if (!ctx) return;
  [523, 659, 784].forEach((f, i) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = f;
    const t = ctx.currentTime + i * 0.1;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.22, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.start(t); osc.stop(t + 0.55);
  });
}

/* ── Build reel cell DOM for a single digit ── */
function buildReelCell(initialDigit = 0) {
  const cell  = document.createElement('div');
  cell.className = 'reel-cell';

  const maskT = document.createElement('div'); maskT.className = 'reel-mask-top';
  const maskB = document.createElement('div'); maskB.className = 'reel-mask-bottom';
  const strip = document.createElement('div'); strip.className = 'reel-strip';

  /* Pre-populate strip with digits 0-9 twice (for wrap-around) */
  for (let pass = 0; pass < 3; pass++) {
    for (let d = 0; d < 10; d++) {
      const el = document.createElement('div');
      el.className = 'reel-digit'; el.textContent = d;
      strip.appendChild(el);
    }
  }

  cell.appendChild(strip);
  cell.appendChild(maskT);
  cell.appendChild(maskB);
  cell._strip        = strip;
  cell._currentDigit = initialDigit;
  return cell;
}

/* ── Build or rebuild a full reel display for a number ──
   Renders digit cells + comma separators into container el. */
/* ── Build or rebuild a full reel display ──────────────────────────
   Commas are inserted AFTER each digit whose position from the right
   is a non-zero multiple of 3 — e.g. 1,950 → [1][,][9][5][0].
   For values < 1000 no comma is ever inserted.
   Rebuilds completely on every call so commas always track value.
─────────────────────────────────────────────────────────────────── */
function buildReelDisplay(containerId, value) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';

  const rounded = Math.max(0, Math.round(value));
  const digits  = String(rounded).split('');
  const total   = digits.length;

  digits.forEach((ch, i) => {
    const fromRight = total - 1 - i;

    const cell = buildReelCell(parseInt(ch));
    cell.dataset.digitIndex = i;
    cell.dataset.fromRight  = fromRight;
    container.appendChild(cell);

    /* Insert comma AFTER this digit if the position from right
       is a non-zero multiple of 3 (e.g. thousands separator) */
    if (fromRight > 0 && fromRight % 3 === 0) {
      const sep = document.createElement('span');
      sep.className = 'reel-sep'; sep.textContent = ',';
      container.appendChild(sep);
    }
  });
}

/* ── Animate one reel cell to a target digit ──────────────────────
   KEY FIXES:
   1. cellH passed in (measured once after fonts.ready, not per-cell)
   2. Animates DIRECTLY to final position — no secondary snap
   3. Per-digit random spins (2–6), duration (700–1600ms), delay jitter
   4. Velocity blur: CSS keyframe injected per animation
   5. Elastic overshoot cubic-bezier on the single animation
   6. will-change: transform already on .reel-strip
─────────────────────────────────────────────────────────────────── */
function animateReelCell(cell, targetDigit, direction, baseDelay, cellH, onLock) {
  const strip   = cell._strip;
  const current = (cell._currentDigit !== undefined) ? cell._currentDigit : 0;

  /* Per-digit randomness — digits feel independent */
  const spins   = 2 + Math.floor(Math.random() * 5);       /* 2–6 full cycles */
  const dur     = 700  + Math.random() * 900;               /* 700–1600ms */
  const jitter  = (Math.random() - 0.5) * 80;              /* ±80ms jitter */
  const delay   = Math.max(0, baseDelay + jitter);

  /* Step count: full rotations + steps to reach targetDigit in direction */
  let steps;
  if (direction === 'up') {
    const fwd = (targetDigit - current + 10) % 10;
    steps = spins * 10 + (fwd === 0 ? 10 : fwd);
  } else {
    const back = (current - targetDigit + 10) % 10;
    steps = spins * 10 + (back === 0 ? 10 : back);
  }

  /* FINAL offset — this is where we animate TO, directly.
     The strip starts positioned at -current*cellH.
     Going 'up' means strip moves negative (more -Y).
     Going 'down' means strip moves positive (less -Y).
     After `steps` digits the strip is at -(current ± steps)*cellH,
     which modulo 30 digits lands on targetDigit in the third pass. */
  const startY = -current * cellH;
  const endY   = direction === 'up'
    ? startY - steps * cellH
    : startY + steps * cellH;

  /* 1. Snap to start position, no transition */
  strip.style.transition = 'none';
  strip.style.transform  = `translateY(${startY}px)`;
  void strip.offsetHeight; /* force reflow */

  setTimeout(() => {
    /* 2. Apply motion blur (direction-aware) */
    cell.style.filter = direction === 'up'
      ? 'blur(3px) brightness(1.5)'
      : 'blur(3px) brightness(0.6)';

    /* 3. Tick sounds during spin */
    const tickCount = spins * 8;
    for (let t = 0; t < tickCount; t++) {
      setTimeout(() => playTick(130 + Math.random() * 120, 0.08),
        (dur * 0.85 / tickCount) * t);
    }

    /* 4. Single animation directly to endY with elastic cubic-bezier.
          The elastic bezier (0.175, 0.885, 0.32, 1.275) provides the
          overshoot — no second transition needed. This IS the snap + bounce. */
    strip.style.transition =
      `transform ${dur}ms cubic-bezier(0.175, 0.885, 0.32, 1.275)`;
    strip.style.transform  = `translateY(${endY}px)`;

    /* 5. Clear blur halfway through spin */
    setTimeout(() => { cell.style.filter = 'none'; }, dur * 0.6);

    /* 6. After animation: update state, play lock sound, fire callback */
    setTimeout(() => {
      /* Normalise position to the equivalent digit in pass 0
         (so future animations have a consistent starting point) */
      strip.style.transition = 'none';
      strip.style.transform  = `translateY(${-targetDigit * cellH}px)`;
      cell._currentDigit = targetDigit;
      void strip.offsetHeight;

      playLock(parseInt(cell.dataset.fromRight || 0));
      if (onLock) onLock();
    }, dur + 60); /* +60ms buffer after transition completes */

  }, delay);
}

/* ── Animate a full reel display to a new number ──────────────────
   Measures cellH ONCE from a real cell after layout.
   Locks right-to-left with staggered delays.
─────────────────────────────────────────────────────────────────── */
function animateReelTo(containerId, newValue, onComplete) {
  const container = document.getElementById(containerId);
  if (!container) { if (onComplete) onComplete(); return; }

  const rounded = Math.max(0, Math.round(newValue));
  const newStr  = String(rounded);
  const cells   = [...container.querySelectorAll('.reel-cell')];

  /* Always rebuild when digit count changes so comma positions are correct.
     Preserve _currentDigit on existing cells so animation starts from
     the right place. */
  if (cells.length !== newStr.length) {
    /* Save current digit state before rebuild */
    const prevDigits = cells.map(c => c._currentDigit || 0);

    buildReelDisplay(containerId, rounded);

    /* Restore digit state on new cells (pad/trim as needed) */
    const newCells = [...container.querySelectorAll('.reel-cell')];
    newCells.forEach((cell, i) => {
      /* Align from right: carry over the digit that was in that position */
      const prevIdx = prevDigits.length - newCells.length + i;
      cell._currentDigit = (prevIdx >= 0 && prevIdx < prevDigits.length)
        ? prevDigits[prevIdx] : 0;
      if (cell._strip) {
        cell._strip.style.transition = 'none';
        /* Position strip at the preserved current digit */
        const cellH = cell.getBoundingClientRect().height || 62;
        cell._strip.style.transform =
          `translateY(${-(cell._currentDigit) * cellH}px)`;
      }
    });

    return setTimeout(() => animateReelTo(containerId, rounded, onComplete), 60);
  }

  /* Measure cellH from actual painted DOM */
  const cellH = cells.length > 0 ? cells[0].getBoundingClientRect().height : 0;
  if (cellH === 0) {
    return requestAnimationFrame(() =>
      setTimeout(() => animateReelTo(containerId, rounded, onComplete), 80));
  }

  const digits = newStr.split('').map(Number);
  const total  = cells.length;
  let   locked = 0;

  /* Singles lock first (revIdx 0 = rightmost), then tens, hundreds left→right.
     This is the correct mechanical odometer order. */
  cells.slice().reverse().forEach((cell, revIdx) => {
    const targetDigit = digits[total - 1 - revIdx];
    const direction   = revIdx % 2 === 0 ? 'up' : 'down';
    /* Singles (revIdx 0) = delay 0, tens (revIdx 1) = delay 150, etc. */
    const baseDelay   = revIdx * 150;

    animateReelCell(cell, targetDigit, direction, baseDelay, cellH, () => {
      locked++;
      if (locked === total && onComplete) onComplete();
    });
  });
}

/* ── Flash a reel to a new value instantly — no casino spin ─────────
   Used in the education sequence so numbers update cleanly and
   the focus stays on understanding the headcount effect.
   Rebuilds if digit count changes (commas stay correct).
─────────────────────────────────────────────────────────────────── */
function flashReelTo(containerId, newValue) {
  const container = document.getElementById(containerId);
  if (!container) return;

  const rounded = Math.max(0, Math.round(newValue));
  const newStr  = String(rounded);
  const cells   = [...container.querySelectorAll('.reel-cell')];

  if (cells.length !== newStr.length) {
    buildReelDisplay(containerId, rounded);
    /* Immediately position all new cells at their target digit */
    const newCells = [...container.querySelectorAll('.reel-cell')];
    const cellH    = newCells.length > 0
      ? newCells[0].getBoundingClientRect().height || 62 : 62;
    newStr.split('').forEach((ch, i) => {
      const d = parseInt(ch);
      const c = newCells[i];
      if (!c) return;
      c._currentDigit = d;
      c._strip.style.transition = 'none';
      c._strip.style.transform  = `translateY(${-d * cellH}px)`;
    });
    return;
  }

  const cellH = cells.length > 0
    ? cells[0].getBoundingClientRect().height || 62 : 62;

  newStr.split('').forEach((ch, i) => {
    const d = parseInt(ch);
    const c = cells[i];
    if (!c) return;
    c._currentDigit = d;
    c._strip.style.transition = 'transform 200ms ease-out';
    c._strip.style.transform  = `translateY(${-d * cellH}px)`;
  });
}

/* ════════════════════════════════════════════════════════════════════
   WEB HAPTICS — faithful vanilla JS port of github.com/lochie/web-haptics
   
   The mechanism: a hidden <label> containing <input type="checkbox" switch>
   Clicking the label toggles the checkbox, which fires iOS native taptics.
   The library drives patterns by clicking the label at timed intervals
   using requestAnimationFrame — same approach used here exactly.
   
   Patterns from packages/web-haptics/src/lib/web-haptics/patterns.ts
════════════════════════════════════════════════════════════════════ */

const TOGGLE_MIN = 16;  /* ms at intensity 1 */
const TOGGLE_MAX = 184; /* range above min */

/* Build the hidden label + switch checkbox and append to body */
const _hapticLabel = (() => {
  const label = document.createElement('label');
  label.setAttribute('for', 'ollieboard-haptic-switch');
  label.style.cssText =
    'position:fixed;display:none;bottom:-999px;left:-999px;' +
    'width:1px;height:1px;overflow:hidden;pointer-events:none;';

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.setAttribute('switch', ''); /* iOS Safari taptic engine trigger */
  cb.id = 'ollieboard-haptic-switch';
  cb.style.cssText = 'all:initial;appearance:auto;';

  label.appendChild(cb);
  document.addEventListener('DOMContentLoaded', () => {
    document.body.appendChild(label);
  });
  /* If DOM already ready, append immediately */
  if (document.readyState !== 'loading') {
    document.body.appendChild(label);
  }
  return label;
})();

/* Patterns exactly from patterns.ts */
const HAPTIC_PATTERNS = {
  buzz:    { pattern: [{ duration: 1000, intensity: 1 }] },
  success: { pattern: [
    { duration: 30,  intensity: 0.5 },
    { delay: 60, duration: 40, intensity: 1 }
  ]},
  error:   { pattern: [
    { duration: 40, intensity: 0.7 },
    { delay: 40, duration: 40, intensity: 0.7 },
    { delay: 40, duration: 40, intensity: 0.9 },
    { delay: 40, duration: 50, intensity: 0.6 }
  ]},
  nudge:   { pattern: [
    { duration: 80, intensity: 0.8 },
    { delay: 80, duration: 50, intensity: 0.3 }
  ]},
};

/* Active rAF id so we can cancel a running pattern */
let _hapticRafId = null;

/* Faithful port of runPattern() from index.ts */
function haptic(name) {
  const preset = HAPTIC_PATTERNS[name];
  if (!preset) return;

  /* Cancel any running pattern */
  if (_hapticRafId !== null) {
    cancelAnimationFrame(_hapticRafId);
    _hapticRafId = null;
  }

  const vibrations   = preset.pattern;
  const defaultIntensity = 0.5;

  /* Build phase boundaries — matches library's runPattern exactly */
  const phases = [];
  let cumulative = 0;
  vibrations.forEach(vib => {
    const intensity = Math.max(0, Math.min(1, vib.intensity ?? defaultIntensity));
    const delay = vib.delay ?? 0;
    if (delay > 0) {
      cumulative += delay;
      phases.push({ end: cumulative, isOn: false, intensity: 0 });
    }
    cumulative += vib.duration;
    phases.push({ end: cumulative, isOn: true, intensity });
  });
  const totalDuration = cumulative;

  let startTime       = 0;
  let lastToggleTime  = -1;
  let firstClickFired = false;

  /* Fire first click synchronously (library does this to stay in gesture ctx) */
  _hapticLabel.click();
  firstClickFired = true;

  const loop = (time) => {
    if (startTime === 0) startTime = time;
    const elapsed = time - startTime;

    if (elapsed >= totalDuration) {
      _hapticRafId = null;
      return;
    }

    /* Find current phase */
    let phase = phases[0];
    for (const p of phases) {
      if (elapsed < p.end) { phase = p; break; }
    }

    if (phase && phase.isOn) {
      const toggleInterval = TOGGLE_MIN + (1 - phase.intensity) * TOGGLE_MAX;

      if (lastToggleTime === -1) {
        lastToggleTime = time;
        if (!firstClickFired) {
          _hapticLabel.click();
          firstClickFired = true;
        }
      } else if (time - lastToggleTime >= toggleInterval) {
        _hapticLabel.click();
        lastToggleTime = time;
      }
    }

    _hapticRafId = requestAnimationFrame(loop);
  };

  _hapticRafId = requestAnimationFrame(loop);
}

/* ── Headcount change badge ──────────────────────────────────────────
   type: 'alumni'   | 'new-hire' | 'today'
   Alumni  = green  (productivity up, rate rises)
   New hire = red   (productivity dn, rate drops)
   Today   = gold   (returning to actual headcount)
─────────────────────────────────────────────────────────────────── */
function showHeadcountBadge(type) {
  const wrap = document.getElementById('headcountBadge');
  if (!wrap) return;

  wrap.innerHTML = '';

  const config = {
    'alumni':   { icon: '🎓', label: '+ 1 New Alumni',    hapticName: 'success' },
    'new-hire': { icon: '👤', label: '+ 1 New Employee',  hapticName: 'error'   },
    'today':    { icon: '📍', label: "Today's Headcount", hapticName: 'nudge'   },
  }[type] || { icon: '📍', label: type, hapticName: 'nudge' };

  const inner = document.createElement('div');
  inner.className = `hc-badge-inner ${type}`;
  inner.innerHTML =
    `<span class="hc-badge-icon">${config.icon}</span>` +
    `<span>${config.label}</span>`;
  wrap.appendChild(inner);

  /* Haptic feedback */
  haptic(config.hapticName);

  /* Audio feedback */
  const ctx = getAudioCtx();
  if (ctx) {
    if (type === 'alumni') {
      [440, 660].forEach((f, i) => {
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine'; osc.frequency.value = f;
        const t = ctx.currentTime + i * 0.12;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.25, t + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        osc.start(t); osc.stop(t + 0.45);
      });
    } else if (type === 'new-hire') {
      [520, 320].forEach((f, i) => {
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sawtooth'; osc.frequency.value = f;
        const t = ctx.currentTime + i * 0.14;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.2, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
        osc.start(t); osc.stop(t + 0.4);
      });
    } else if (type === 'today') {
      /* Soft single tone — returning home */
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = 528;
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.55);
    }
  }

  /* Auto-dismiss: fade up after 1.8s */
  setTimeout(() => {
    inner.style.animation = 'badgeFadeUp 0.45s ease-in both';
    setTimeout(() => { wrap.innerHTML = ''; }, 500);
  }, 1800);
}

/* ── Countdown ticker ── */
let _introTimer   = null;
let _countdownInt = null;

function startIntroCountdown() {
  let secs = 8;
  const cdEl = document.getElementById('introCountdown');
  if (cdEl) cdEl.textContent = `Closing in ${secs}…`;
  _countdownInt = setInterval(() => {
    secs--;
    if (cdEl) cdEl.textContent = secs > 0 ? `Closing in ${secs}…` : 'Closing…';
    if (secs <= 0) { clearInterval(_countdownInt); dismissIntro(); }
  }, 1000);
  _introTimer = setTimeout(dismissIntro, (secs + 1) * 1000);
}

/* ── Show intro (also used for replay) ── */
async function showIntro() {
  getAudioCtx();
  haptic('buzz'); /* buzz haptic on initial page load */

  const screen = document.getElementById('introScreen');
  const replay = document.getElementById('replayIntroBtn');
  screen.classList.remove('dismissing');
