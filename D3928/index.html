  replay.style.display = 'none';

  const cdEl = document.getElementById('introCountdown');
  if (cdEl) cdEl.textContent = 'Closing in 8…';
  clearTimeout(_introTimer);
  clearInterval(_countdownInt);

  /* ── Compute all values at real headcount ── */
  const teammates  = Math.round(avg30DayHeadcount());
  const rate       = calcDailyRate(teammates);
  const pool       = calcOABonusPool(teammates);
  const perPerson  = teammates > 0 ? Math.round(pool / teammates) : 0;
  const days       = daysSinceLastOA();

  /* ── Dynamic subtexts ── */
  const subPer  = document.getElementById('introSubPerPerson');
  const subTot  = document.getElementById('introSubTotal');
  const subRate = document.getElementById('introSubRate');

  if (subTot) subTot.innerHTML =
    `Days since last OA (${days}) × daily rate`;
  if (subRate) subRate.textContent =
    `$${STORE_CONFIG.daily_piggybank_rate}/day base · ` +
    `+$${STORE_CONFIG.daily_piggybank_rate}/day per teammate below baseline of ${STORE_CONFIG.baseline_headcount}`;
  if (subPer) subPer.textContent =
    `Total pool ÷ ${teammates} teammate${teammates !== 1 ? 's' : ''}`;

  /* ── GIF ── */
  const gif = document.getElementById('introGif');
  const ph  = document.getElementById('introGifPlaceholder');
  if (gif && gif.src && !gif.src.endsWith('/')) {
    gif.style.display = 'block';
    if (ph) ph.style.display = 'none';
  }

  /* ── Build all 4 reels at correct digit width ── */
  buildReelDisplay('reelTeammates', teammates);
  buildReelDisplay('reelRate',      rate);
  buildReelDisplay('reelPerPerson', perPerson);
  buildReelDisplay('reelTotal',     pool);

  /* ── Teammates + Rate: preload at final value immediately (no animation)
     They don't change often — no casino excitement needed for them.
     Total + PerPerson: zero out for the casino spin.               ── */
  ['reelTeammates','reelRate'].forEach(id => {
    const val = id === 'reelTeammates' ? teammates : rate;
    document.getElementById(id)?.querySelectorAll('.reel-cell').forEach((cell, i) => {
      const digit = parseInt(String(val)[i] || '0');
      cell._currentDigit = digit;
      if (cell._strip) {
        cell._strip.style.transition = 'none';
        /* Position strip directly at the final digit — visible immediately */
        cell._strip.style.transform = `translateY(-${digit * (cell.offsetHeight || 62)}px)`;
      }
    });
  });

  ['reelTotal','reelPerPerson'].forEach(id => {
    document.getElementById(id)?.querySelectorAll('.reel-cell').forEach(cell => {
      cell._currentDigit = 0;
      if (cell._strip) {
        cell._strip.style.transition = 'none';
        cell._strip.style.transform  = 'translateY(0px)';
      }
    });
  });

  /* ── Wait for fonts + layout ── */
  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 400));

  /* ── SEQUENCE ─────────────────────────────────────────────────────
     Teammates + Rate already showing — no animation needed.

     Phase 1: Total OA Bonus AND Per Teammate animate simultaneously.
              Both use singles-first lock order (handled inside
              animateReelTo). They fire at the same time.

     Education sequence (instant flash — no casino spin):
     Phase 2: Headcount → baseline+1 → rate drops to $0, pool→$0
     Phase 3: Headcount → baseline-1 → rate rises to $50, pool doubles
     Phase 4: Settle back to real values + chime + countdown
  ──────────────────────────────────────────────────────────────────── */
  const runSequence = () => {
    let totalDone = false;
    let perDone   = false;

    const bothDone = () => {
      if (!totalDone || !perDone) return;

      /* ── PAUSE: real numbers breathe for 2s ── */
      setTimeout(() => {

        /* ── Phase A: alumni (headcount -1 → rate rises) ── */
        showHeadcountBadge('alumni');
        setTimeout(() => {
          const downTeam = Math.max(1, teammates - 1);
          const downRate = calcDailyRate(downTeam);
          const downPool = calcOABonusPool(downTeam);
          const downPer  = downTeam > 0 ? Math.round(downPool / downTeam) : 0;
          flashReelTo('reelTeammates', downTeam);
          flashReelTo('reelRate',      downRate);
          flashReelTo('reelPerPerson', downPer);
          flashReelTo('reelTotal',     downPool);
          if (subPer) subPer.textContent =
            `Total pool ÷ ${downTeam} teammate${downTeam !== 1 ? 's' : ''}`;

          /* ── Phase B: back to baseline (Today's Headcount) ── */
          setTimeout(() => {
            showHeadcountBadge('today');
            setTimeout(() => {
              flashReelTo('reelTeammates', teammates);
              flashReelTo('reelRate',      rate);
              flashReelTo('reelPerPerson', perPerson);
              flashReelTo('reelTotal',     pool);
              if (subPer) subPer.textContent =
                `Total pool ÷ ${teammates} teammate${teammates !== 1 ? 's' : ''}`;

              /* ── Phase C: new-hire (headcount +1 → rate drops) ── */
              setTimeout(() => {
                showHeadcountBadge('new-hire');
                setTimeout(() => {
                  const upTeam = teammates + 1;
                  const upRate = calcDailyRate(upTeam);
                  const upPool = calcOABonusPool(upTeam);
                  const upPer  = upTeam > 0 ? Math.round(upPool / upTeam) : 0;
                  flashReelTo('reelTeammates', upTeam);
                  flashReelTo('reelRate',      upRate);
                  flashReelTo('reelPerPerson', upPer);
                  flashReelTo('reelTotal',     upPool);
                  if (subPer) subPer.textContent =
                    `Total pool ÷ ${upTeam} teammate${upTeam !== 1 ? 's' : ''}`;

                  /* ── Phase D: settle back to real values ── */
                  setTimeout(() => {
                    showHeadcountBadge('today');
                    setTimeout(() => {
                      flashReelTo('reelTeammates', teammates);
                      flashReelTo('reelRate',      rate);
                      flashReelTo('reelPerPerson', perPerson);
                      flashReelTo('reelTotal',     pool);
                      if (subPer) subPer.textContent =
                        `Total pool ÷ ${teammates} teammate${teammates !== 1 ? 's' : ''}`;
                      setTimeout(() => { playChime(); startIntroCountdown(); }, 800);
                    }, 300);
                  }, 2200);
                }, 300);
              }, 2000);
            }, 300);
          }, 2200);
        }, 300);

      }, 2000); /* 2s pause on real numbers */
    };

    /* Fire Total and PerPerson simultaneously — singles lock first in each */
    animateReelTo('reelTotal', pool, () => {
      totalDone = true; bothDone();
    });
    animateReelTo('reelPerPerson', perPerson, () => {
      perDone = true; bothDone();
    });
  };

  runSequence();
}

/* ── Dismiss intro ── */
function dismissIntro() {
  clearTimeout(_introTimer);
  clearInterval(_countdownInt);

  const screen = document.getElementById('introScreen');
  const replay = document.getElementById('replayIntroBtn');

  screen.classList.add('dismissing');
  setTimeout(() => {
    screen.style.display = 'none';
    replay.style.display = 'block';
  }, 700); /* matches CSS transition duration */
}

/* ════════════════════════════════════════════════════════════════════
   MOUNT
════════════════════════════════════════════════════════════════════ */
const board = document.getElementById('board');
SPACES.forEach(s => {
  let el;
  if (s.type === 'corner')  el = buildCorner(s);
  else if (s.color)          el = buildProperty(s);
  else                       el = buildPlain(s);
  board.appendChild(el);
});

/* Build employee pills in toggle bar */
buildEmpPills();

/* CENTER GRID CELLS */
for (let gr = 2; gr <= 10; gr++) {
  for (let gc = 2; gc <= 10; gc++) {
    const cx = gc - 6; const cy = 6 - gr;
    const cell = document.createElement('div');
    cell.className = `center-cell cell-r${gr}-c${gc}`;
    cell.dataset.cx = cx; cell.dataset.cy = cy;
    cell.style.gridRow = gr; cell.style.gridColumn = gc;
    cell.title = `(${cx}, ${cy})`;
    board.appendChild(cell);
  }
}

requestAnimationFrame(() => {
  requestAnimationFrame(() => {
    applyRotations();
    window.addEventListener('resize', applyRotations);
  });
});

/* SCORE BAR — all values derived from live data functions */
(function() {
  const activeProps = SPACES.filter(s => s.type === 'property' && s.active);

  /* 1. Total OA Bonus pool — days × daily rate (flat team total) */
  const totalOABonus   = calcOABonusPool();
  const bonusPerPerson = calcOABonusPerTeammate();

  /* 2. Team Contribution % — active spaces with ≥1 completion / total active spaces */
  const spacesWithAny = activeProps.filter(s => totalCompletions(s.id) > 0).length;
  const teamPct = activeProps.length > 0
    ? Math.round(spacesWithAny / activeProps.length * 100) : 0;

  /* 3. Board Progress for "Go" Raise — active spaces where ≥1 employee earned a star */
  const starsCount = activeProps.filter(s => DONE.has(s.id)).length;
  const allProps   = SPACES.filter(s => s.type === 'property');
  const starsPct   = allProps.length > 0
    ? Math.round(starsCount / allProps.length * 100) : 0;

  document.getElementById('scoreBar').innerHTML = `
    <div class="score-pill">
      <div class="score-label">Total OA Bonus Pool</div>
      <div class="score-value">$${totalOABonus.toLocaleString('en-US')}<span> / $${bonusPerPerson.toLocaleString('en-US')} ea.</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:100%"></div></div>
    </div>
    <div class="score-pill">
      <div class="score-label">Team Contribution</div>
      <div class="score-value">${teamPct}<span>%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${teamPct}%"></div></div>
    </div>
    <div class="score-pill">
      <div class="score-label">Board Progress for "Go" Raise</div>
      <div class="score-value">${starsPct}<span>%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${starsPct}%"></div></div>
    </div>`;
})();

/* ── Launch intro after board is fully painted ── */
requestAnimationFrame(() => setTimeout(showIntro, 120));
</script>
